services:
  api-server:
    build:
      context: ../..
      dockerfile: deploy/docker/api-server.Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        PNPM_VERSION: ${PNPM_VERSION:-10.8.0}
    env_file:
      - ./.env.test
    environment:
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 3100
      API_SERVER_PREFIX: api
      ADMIN_DATA_FILE: /app/runtime/admin-store.json
      PUBLIC_WORKS_DATA_FILE: /app/runtime/public-works.json
      PUBLIC_ADDRESSES_DATA_FILE: /app/runtime/public-addresses.json
      PUBLIC_ORDERS_DATA_FILE: /app/runtime/public-orders.json
      STORAGE_LOCAL_ROOT: /app/uploads
    ports:
      - "127.0.0.1:${API_SERVER_BIND_PORT:-3100}:3100"
    volumes:
      - ${API_DATA_ROOT:-/opt/xiaoyeji/runtime/data}:/app/runtime
      - ${API_UPLOADS_ROOT:-/opt/xiaoyeji/runtime/uploads}:/app/uploads
    restart: unless-stopped
