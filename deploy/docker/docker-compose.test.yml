services:
  api-server:
    build:
      context: ../..
      dockerfile: deploy/docker/api-server.Dockerfile
    env_file:
      - ./.env.test
    environment:
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 3100
      API_SERVER_PREFIX: api
      ADMIN_DATA_FILE: /app/runtime/admin-store.json
      PUBLIC_WORKS_DATA_FILE: /app/runtime/public-works.json
      PUBLIC_ADDRESSES_DATA_FILE: /app/runtime/public-addresses.json
      PUBLIC_ORDERS_DATA_FILE: /app/runtime/public-orders.json
      STORAGE_LOCAL_ROOT: /app/uploads
    volumes:
      - ./runtime/data:/app/runtime
      - ./runtime/uploads:/app/uploads
    restart: unless-stopped

  admin-web:
    build:
      context: ../..
      dockerfile: deploy/docker/admin-web.Dockerfile
      args:
        VITE_ADMIN_APP_NAME: ${VITE_ADMIN_APP_NAME:-小叶记管理后台（测试）}
        VITE_ADMIN_API_BASE_URL: ${VITE_ADMIN_API_BASE_URL:-/api}
        VITE_ADMIN_ASSET_BASE_URL: ${VITE_ADMIN_ASSET_BASE_URL:-}
    restart: unless-stopped

  openresty:
    image: openresty/openresty:1.27.1.2-0-alpine
    depends_on:
      - api-server
      - admin-web
    ports:
      - "${TEST_HTTP_PORT:-8080}:80"
    volumes:
      - ../nginx/openresty-test.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
