name: Deploy Test Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-test:
    name: Sync Test Server
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.TEST_SSH_KEY }}" > ~/.ssh/test_deploy_key
          chmod 600 ~/.ssh/test_deploy_key

      - name: Prepare known_hosts
        shell: bash
        env:
          TEST_HOST: ${{ secrets.TEST_HOST }}
          TEST_PORT: ${{ secrets.TEST_PORT }}
        run: |
          : "${TEST_HOST:?Missing TEST_HOST}"
          DEPLOY_PORT="${TEST_PORT:-22}"
          DEPLOY_HOST="$(printf '%s' "$TEST_HOST" | tr -d '\r' | xargs)"
          DEPLOY_HOST="${DEPLOY_HOST#http://}"
          DEPLOY_HOST="${DEPLOY_HOST#https://}"
          DEPLOY_HOST="${DEPLOY_HOST%%/*}"

          if [ -z "$DEPLOY_HOST" ]; then
            echo "TEST_HOST is empty after normalization"
            exit 1
          fi

          echo "Prepare known_hosts: starting diagnostics"
          echo "DEPLOY_PORT=$DEPLOY_PORT"
          echo "DEPLOY_HOST_LENGTH=${#DEPLOY_HOST}"

          python3 - <<'PY' "$DEPLOY_HOST" "$DEPLOY_PORT"
          import socket
          import sys

          host = sys.argv[1]
          port = int(sys.argv[2])

          print("Python DNS lookup start")
          try:
              infos = socket.getaddrinfo(host, port, type=socket.SOCK_STREAM)
              addrs = sorted({info[4][0] for info in infos})
              print(f"Python DNS lookup ok, resolved_count={len(addrs)}")
          except Exception as exc:
              print(f"Python DNS lookup failed: {exc}")
              sys.exit(1)

          print("Python TCP probe start")
          sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          sock.settimeout(10)
          try:
              sock.connect((host, port))
              print("Python TCP probe ok")
          except Exception as exc:
              print(f"Python TCP probe failed: {exc}")
              sys.exit(1)
          finally:
              sock.close()
          PY

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if ! ssh-keyscan -T 10 -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts 2> /tmp/ssh-keyscan.stderr; then
            echo "ssh-keyscan failed"
            cat /tmp/ssh-keyscan.stderr || true
            exit 1
          fi

          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "ssh-keyscan returned empty known_hosts"
            cat /tmp/ssh-keyscan.stderr || true
            exit 1
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Run test environment sync
        shell: bash
        env:
          TEST_HOST: ${{ secrets.TEST_HOST }}
          TEST_PORT: ${{ secrets.TEST_PORT }}
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PROJECT_DIR: ${{ secrets.TEST_PROJECT_DIR }}
        run: |
          : "${TEST_HOST:?Missing TEST_HOST}"
          : "${TEST_USER:?Missing TEST_USER}"
          : "${TEST_PROJECT_DIR:?Missing TEST_PROJECT_DIR}"
          DEPLOY_PORT="${TEST_PORT:-22}"
          DEPLOY_HOST="$(printf '%s' "$TEST_HOST" | tr -d '\r' | xargs)"
          DEPLOY_HOST="${DEPLOY_HOST#http://}"
          DEPLOY_HOST="${DEPLOY_HOST#https://}"
          DEPLOY_HOST="${DEPLOY_HOST%%/*}"

          if [ -z "$DEPLOY_HOST" ]; then
            echo "TEST_HOST is empty after normalization"
            exit 1
          fi

          ssh \
            -i ~/.ssh/test_deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$DEPLOY_PORT" \
            "${TEST_USER}@${DEPLOY_HOST}" \
            "cd '$TEST_PROJECT_DIR' && bash deploy/scripts/sync-test-env.sh"
