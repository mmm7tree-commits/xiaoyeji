name: Deploy Test Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-test:
    name: Sync Test Server
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.TEST_SSH_KEY }}" > ~/.ssh/test_deploy_key
          chmod 600 ~/.ssh/test_deploy_key

      - name: Prepare known_hosts
        shell: bash
        env:
          TEST_HOST: ${{ secrets.TEST_HOST }}
          TEST_PORT: ${{ secrets.TEST_PORT }}
        run: |
          : "${TEST_HOST:?Missing TEST_HOST}"
          DEPLOY_PORT="${TEST_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$TEST_HOST" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run test environment sync
        shell: bash
        env:
          TEST_HOST: ${{ secrets.TEST_HOST }}
          TEST_PORT: ${{ secrets.TEST_PORT }}
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PROJECT_DIR: ${{ secrets.TEST_PROJECT_DIR }}
        run: |
          : "${TEST_HOST:?Missing TEST_HOST}"
          : "${TEST_USER:?Missing TEST_USER}"
          : "${TEST_PROJECT_DIR:?Missing TEST_PROJECT_DIR}"
          DEPLOY_PORT="${TEST_PORT:-22}"

          ssh \
            -i ~/.ssh/test_deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$DEPLOY_PORT" \
            "${TEST_USER}@${TEST_HOST}" \
            "cd '$TEST_PROJECT_DIR' && bash deploy/scripts/sync-test-env.sh"
